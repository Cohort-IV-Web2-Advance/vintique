<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>504 - Server Timeout</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    :root{
      --color-cream: #F5F0E8;
      --color-parchment: #EDE5D0;
      --color-brown: #5C3D2E;
      --color-darkbrown: #3B2416;
      --color-amber: #C9843A;
      --color-rust: #B55330;
      --color-sage: #7A8C6E;
      --color-muted: #9A8070;
    }
  </style>
</head>

<body class="min-h-screen font-serif flex items-center justify-center bg-[var(--color-cream)] text-center px-6">

  <div class="max-w-xl">

    <!-- Logo / Brand -->
    <h1 class=" font-serif text-2xl font-bold tracking-[0.4em] text-[var(--color-brown)] mb-10">
      Vintique
    </h1>

    <!-- 504 Number -->
    <h2 class="text-7xl md:text-9xl font-bold text-[var(--color-amber)] drop-shadow-lg">
      504
    </h2>

    <!-- Divider -->
    <div class="flex items-center justify-center my-6">
      <div class="h-px w-16 bg-[var(--color-amber)]"></div>
      <span class="mx-3 text-[var(--color-amber)]">✦</span>
      <div class="h-px w-16 bg-[var(--color-amber)]"></div>
    </div>

    <!-- Title -->
    <h3 class="text-3xl md:text-4xl font-semibold text-[#3B2416] mb-4">
      Server Taking Too Long
    </h3>

    <!-- Message -->
    <p class="text-[#9A8070] text-lg mb-8">
      Sorry, the server is taking too long to respond.
      Please try again in a moment.
    </p>

    <!-- Button -->
    <a href="/"
       class="inline-block bg-[#3B2416] text-white px-8 py-4 rounded-full shadow-lg hover:bg-[#5C3D2E] transition">
       ← Back to Homepage
    </a>

  </div>

</body>
</html>
