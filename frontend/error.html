<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>504 - Server Timeout</title>
 <link rel="stylesheet" href="./src/style.css">
</head>

<body class="min-h-screen font-serif flex items-center justify-center bg-cream text-center px-6">

  <div class="max-w-xl">

    <!-- Logo / Brand -->
    <h1 class=" font-serif text-2xl font-bold tracking-[0.4em] text-brown mb-10">
      Vintique
    </h1>

    <!-- 504 Number -->
    <h2 class="text-7xl md:text-9xl font-bold text-amber drop-shadow-lg">
      504
    </h2>

    <!-- Divider -->
    <div class="flex items-center justify-center my-6">
      <div class="h-px w-16 bg-amber"></div>
      <span class="mx-3 text-amber">✦</span>
      <div class="h-px w-16 bg-amber"></div>
    </div>

    <!-- Title -->
    <h3 class="text-3xl md:text-4xl font-semibold text-darkbrown mb-4">
      Server Taking Too Long
    </h3>

    <!-- Message -->
    <p class="text-muted text-lg mb-8">
      Sorry, the server is taking too long to respond.
      Please try again in a moment.
    </p>

    <!-- Button -->
    <a href="/"
       class="inline-block bg-darkbrown text-white px-8 py-4 rounded-full shadow-lg hover:bg-brown transition">
       ← Back to Homepage
    </a>

  </div>

</body>
</html>
