# PostgreSQL Production Configuration
# Optimized settings for production workloads

# Memory Settings
shared_buffers = 256MB                    # 25% of RAM
effective_cache_size = 1GB                # 75% of RAM
work_mem = 4MB                            # Per query operation
maintenance_work_mem = 64MB               # For maintenance operations

# Connection Settings
max_connections = 200                      # Maximum concurrent connections
shared_preload_libraries = 'pg_stat_statements'  # Enable statistics

# Checkpoint Settings
checkpoint_completion_target = 0.9        # Use 90% of checkpoint time
wal_buffers = 16MB                       # WAL buffer size
checkpoint_timeout = 10min                # Time between checkpoints

# WAL Settings
wal_level = replica                       # Enable replication support
max_wal_size = 1GB                       # Maximum WAL size
min_wal_size = 80MB                      # Minimum WAL size

# Query Planner Settings
random_page_cost = 1.1                   # SSD optimization
effective_io_concurrency = 200           # Concurrent I/O operations

# Logging Settings
log_destination = 'stderr'                # Log to stderr
logging_collector = on                    # Enable log collector
log_directory = 'pg_log'                  # Log directory
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'  # Log file format
log_rotation_age = 1d                     # Rotate daily
log_rotation_size = 100MB                 # Rotate at 100MB
log_min_duration_statement = 1000          # Log slow queries (>1s)
log_checkpoints = on                      # Log checkpoints
log_connections = on                       # Log connections
log_disconnections = on                   # Log disconnections
log_lock_waits = on                       # Log lock waits

# Autovacuum Settings
autovacuum = on                           # Enable autovacuum
autovacuum_max_workers = 3                # Number of autovacuum workers
autovacuum_naptime = 1min                 # Time between vacuum runs

# Statistics Settings
track_activities = on                     # Track session activities
track_counts = on                         # Track row access statistics
track_io_timing = on                      # Track I/O timing
track_functions = all                     # Track function calls

# Security Settings
ssl = on                                  # Enable SSL (for production)
password_encryption = scram-sha-256       # Use strong password encryption
